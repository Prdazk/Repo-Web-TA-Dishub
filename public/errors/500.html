<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>500 Internal Server Error</title>
  <link rel="icon" href="../../logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #f4f4f4;
      color: #333;
    }

    .container {
      max-width: 640px;
      margin: 10% auto;
      background: #fff;
      padding: 40px;
      border: 1px solid #ddd;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
    }

    p {
      margin: 8px 0;
      color: #666;
    }

    hr {
      border: none;
      border-top: 1px solid #e5e5e5;
      margin: 24px 0;
    }

    .footer {
      font-size: 13px;
      color: #999;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>500 Internal Server Error</h1>
    <p>The server encountered an internal error.</p>
    <hr>
    <p class="footer">Please try again later.</p>
  </div>
</body>

</html>
